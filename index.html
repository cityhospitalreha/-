<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0e10">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<title>表情ミラー</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    height:100%; background:#0b0e10; color:#F5F5F0;
    font-family:-apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
    overflow:hidden; -webkit-user-select:none; user-select:none;
  }

  #app { position:relative; width:100%; height:100vh; height:100dvh; overflow:hidden; }
  [hidden] { display:none !important; }

  /* ===== スタート画面 ===== */
  #start-screen, #error-screen {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; padding:32px;
    text-align:center; background:radial-gradient(circle at 50% 30%, #161b1e, #0b0e10);
  }
  .app-title { font-size:28px; font-weight:600; letter-spacing:.02em; }
  .app-desc  { font-size:15px; line-height:1.7; color:rgba(245,245,240,.65); max-width:320px; }
  .privacy-note { font-size:12px; color:rgba(245,245,240,.4); max-width:280px; line-height:1.6; }

  .setting-box {
    display:flex; flex-direction:column; gap:14px;
    background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
    border-radius:16px; padding:16px 24px; width:100%; max-width:300px;
  }
  .setting-row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .setting-label { font-size:14px; color:rgba(245,245,240,.8); }
  .setting-stepper { display:flex; align-items:center; gap:12px; }
  .stepper-btn {
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2);
    color:#F5F5F0; font-size:20px; width:36px; height:36px;
    border-radius:8px; cursor:pointer; line-height:1;
  }
  .stepper-val { font-size:18px; font-weight:700; color:#6EE7DE; min-width:28px; text-align:center; }

  .btn-primary {
    background:linear-gradient(135deg,#6EE7DE,#4FC3BD); color:#06201D;
    font-weight:600; font-size:17px; border:none; border-radius:999px;
    padding:16px 44px; min-height:52px; cursor:pointer;
    box-shadow:0 8px 24px rgba(110,231,222,.25); transition:transform .15s;
  }
  .btn-primary:active { transform:scale(.96); }

  /* ===== カメラ画面 ===== */
  #camera-screen { position:absolute; inset:0; display:flex; flex-direction:column; }

  /* stage: 縦分割がデフォルト */
  #stage {
    position:relative; flex:1; min-height:0;
    display:flex; flex-direction:column;
    background:#000; overflow:hidden;
  }
  @media (orientation:landscape) {
    #stage { flex-direction:row; }
  }

  .pane { position:relative; min-width:0; min-height:0; overflow:hidden; background:#0b0e10; }

  /* ===== 境界スライダー ===== */
  #divider {
    position:absolute; z-index:30;
    background:rgba(110,231,222,.6);
    touch-action:none; cursor:grab; flex-shrink:0;
  }
  #divider:active { background:rgba(110,231,222,1); }

  /* ===== 見本ペイン ===== */
  #sampleCanvas {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:contain; background:#05070a;
  }

  /* ラベル：左上 */
  .sample-label {
    position:absolute; top:10px; left:10px;
    background:rgba(0,0,0,.5); padding:5px 12px;
    border-radius:999px; font-size:12px; color:rgba(245,245,240,.9);
    pointer-events:none;
  }

  /* 回数・セット表示：右上・小さく */
  #setDisplay {
    position:absolute; top:10px; right:10px;
    background:rgba(0,0,0,.45); backdrop-filter:blur(6px);
    border-radius:10px; padding:6px 10px;
    font-size:11px; color:rgba(245,245,240,.7);
    text-align:center; line-height:1.6; pointer-events:none;
  }

  /* GIF操作：右下・縦並びアイコン */
  #gifCtrl {
    position:absolute; bottom:52px; right:8px;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    background:rgba(0,0,0,.45); backdrop-filter:blur(6px);
    border-radius:12px; padding:8px 6px;
  }
  .gif-btn {
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.18);
    color:#F5F5F0; font-size:14px; width:36px; height:36px;
    border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .gif-btn.active { background:rgba(110,231,222,.25); border-color:#6EE7DE; color:#6EE7DE; }
  #speedLabel { font-size:9px; color:rgba(245,245,240,.6); text-align:center; }

  /* 前へ・次へ：左下・横並び小さく */
  #sampleNav {
    position:absolute; bottom:8px; left:8px;
    display:flex; align-items:center; gap:6px;
  }
  .nav-btn {
    background:rgba(0,0,0,.45); backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.18); color:#F5F5F0;
    font-size:12px; padding:6px 12px; border-radius:8px;
    cursor:pointer; min-height:34px;
  }
  #positionText { font-size:11px; color:rgba(245,245,240,.65); }

  /* ===== カメラペイン ===== */
  video#video {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; background:#000;
  }
  video#video.mirrored { transform:scaleX(-1); }

  #guide-overlay {
    position:absolute; inset:0; display:flex;
    align-items:center; justify-content:center; pointer-events:none;
  }
  #guide-overlay .oval {
    width:56%; max-width:340px; aspect-ratio:3/4;
    border:2px dashed rgba(255,255,255,.55); border-radius:50%;
  }

  /* ===== 下部コントロール ===== */
  .controls {
    display:flex; justify-content:center; gap:12px;
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:#0b0e10; border-top:1px solid rgba(255,255,255,.08);
  }
  .btn-control {
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.18);
    color:#F5F5F0; font-size:14px; font-weight:500; border-radius:14px;
    padding:10px 18px; min-height:46px; min-width:88px; cursor:pointer;
  }
  .btn-control.active { background:rgba(110,231,222,.22); border-color:#6EE7DE; color:#6EE7DE; }
  .btn-control.danger { background:rgba(255,138,101,.16); border-color:rgba(255,138,101,.4); color:#FF8A65; }

  #error-screen .app-desc { color:rgba(255,200,190,.85); }
</style>
</head>
<body>
<div id="app">

  <!-- スタート画面 -->
  <div id="start-screen">
    <div class="app-title">表情ミラー</div>
    <div class="app-desc">カメラに自分の顔を映して、表情の練習にお使いください。</div>
    <div class="setting-box">
      <div class="setting-row">
        <span class="setting-label">1セットの回数</span>
        <div class="setting-stepper">
          <button class="stepper-btn" id="repMinusBtn">－</button>
          <span class="stepper-val" id="repVal">5</span>
          <button class="stepper-btn" id="repPlusBtn">＋</button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">セット数</span>
        <div class="setting-stepper">
          <button class="stepper-btn" id="setMinusBtn">－</button>
          <span class="stepper-val" id="setVal">2</span>
          <button class="stepper-btn" id="setPlusBtn">＋</button>
        </div>
      </div>
    </div>
    <button id="startBtn" class="btn-primary">カメラを起動</button>
    <div class="privacy-note">映像は録画・保存されず、外部にも送信されません。</div>
  </div>

  <!-- カメラ画面 -->
  <div id="camera-screen" hidden>
    <div id="stage">

      <!-- 見本ペイン -->
      <div class="pane" id="samplePane">
        <canvas id="sampleCanvas"></canvas>
        <div class="sample-label" id="sampleLabel"></div>
        <div id="setDisplay"></div>

        <!-- GIF操作：右下縦 -->
        <div id="gifCtrl">
          <button class="gif-btn" id="gifSlowBtn">🐢</button>
          <button class="gif-btn active" id="gifPlayBtn">⏸</button>
          <button class="gif-btn" id="gifFastBtn">🐇</button>
          <div id="speedLabel">標準</div>
        </div>

        <!-- 前へ・次へ：左下 -->
        <div id="sampleNav">
          <button class="nav-btn" id="prevBtn">前へ</button>
          <span id="positionText">1 / 8</span>
          <button class="nav-btn" id="nextBtn">次へ</button>
        </div>
      </div>

      <!-- 境界スライダー -->
      <div id="divider"></div>

      <!-- カメラペイン -->
      <div class="pane" id="cameraPane">
        <video id="video" autoplay playsinline muted></video>
        <div id="guide-overlay" hidden><div class="oval"></div></div>
      </div>
    </div>

    <div class="controls">
      <button id="guideToggleBtn" class="btn-control">ガイド表示</button>
      <button id="settingBtn"     class="btn-control">設定変更</button>
      <button id="stopBtn"        class="btn-control danger">終了</button>
    </div>
  </div>

  <!-- エラー画面 -->
  <div id="error-screen" hidden>
    <div class="app-title">カメラを起動できません</div>
    <div id="errorMessage" class="app-desc"></div>
    <button id="retryBtn" class="btn-primary">もう一度試す</button>
  </div>

</div>
<script>
// ===== サンプル定義 =====
const SAMPLES = [
  { file:'samples/01.gif', label:'開口－閉口' },
  { file:'samples/05.gif', label:'口唇の突出－引き（う・い）' },
  { file:'samples/04.gif', label:'口唇の運動（あ・お・う）' },
  { file:'samples/02.gif', label:'舌の突出－引き' },
  { file:'samples/08.gif', label:'舌の左右' },
  { file:'samples/06.gif', label:'舌の上下' },
  { file:'samples/10.gif', label:'舌の運動（一周・時計回り）' },
  { file:'samples/11.gif', label:'舌の運動（一周・反時計回り）' },
];

// ===== 設定 =====
let repCount = 5, setCount = 2;
const repValEl = document.getElementById('repVal');
const setValEl = document.getElementById('setVal');
document.getElementById('repMinusBtn').onclick = () => { if(repCount>1)  { repCount--; repValEl.textContent=repCount; } };
document.getElementById('repPlusBtn').onclick  = () => { if(repCount<20) { repCount++; repValEl.textContent=repCount; } };
document.getElementById('setMinusBtn').onclick = () => { if(setCount>1)  { setCount--; setValEl.textContent=setCount; } };
document.getElementById('setPlusBtn').onclick  = () => { if(setCount<10) { setCount++; setValEl.textContent=setCount; } };

// ===== DOM =====
const startScreen  = document.getElementById('start-screen');
const cameraScreen = document.getElementById('camera-screen');
const errorScreen  = document.getElementById('error-screen');
const stage        = document.getElementById('stage');
const samplePane   = document.getElementById('samplePane');
const cameraPane   = document.getElementById('cameraPane');
const divider      = document.getElementById('divider');
const video        = document.getElementById('video');
const guideOverlay = document.getElementById('guide-overlay');
const sampleCanvas = document.getElementById('sampleCanvas');
const ctx          = sampleCanvas.getContext('2d');
const sampleLabel  = document.getElementById('sampleLabel');
const setDisplay   = document.getElementById('setDisplay');
const positionText = document.getElementById('positionText');

// ===== GIFフレーム制御 =====
// SuperGIFを使わず、Imageタグで各フレームを管理する
// 方法：offscreenImageを使い、一定間隔でcanvasに描画
let gifImage    = new Image();
let gifPaused   = false;
let rafId       = null;
let lastDraw    = 0;
// speedMultiplier: 1=標準, 2=ゆっくり(半速), 0.5=はやい(2倍速)
const SPEEDS    = [{label:'遅い×2', m:2},{label:'遅い', m:1.5},{label:'標準', m:1},{label:'早い', m:0.7}];
let speedIdx    = 2; // 標準

const speedLabel  = document.getElementById('speedLabel');
const gifPlayBtn  = document.getElementById('gifPlayBtn');
const gifSlowBtn  = document.getElementById('gifSlowBtn');
const gifFastBtn  = document.getElementById('gifFastBtn');

function drawFrame() {
  if (!gifImage.complete || !gifImage.naturalWidth) return;
  const cw = sampleCanvas.width  = samplePane.clientWidth;
  const ch = sampleCanvas.height = samplePane.clientHeight;
  const iw = gifImage.naturalWidth, ih = gifImage.naturalHeight;
  const scale = Math.min(cw/iw, ch/ih);
  const dw = iw*scale, dh = ih*scale;
  ctx.clearRect(0,0,cw,ch);
  ctx.fillStyle = '#05070a';
  ctx.fillRect(0,0,cw,ch);
  ctx.drawImage(gifImage, (cw-dw)/2, (ch-dh)/2, dw, dh);
}

// GIFはブラウザが自動でアニメーションするのでcanvasにrequestAnimationFrameで転写
// 一時停止：gifImageのsrcをdataURLに固定し、アニメを止める
let frozenDataUrl = null;

function startGifLoop() {
  if (rafId) cancelAnimationFrame(rafId);
  function loop(ts) {
    drawFrame();
    if (!gifPaused) rafId = requestAnimationFrame(loop);
  }
  rafId = requestAnimationFrame(loop);
}

function loadSample(idx) {
  gifPaused = false;
  gifPlayBtn.textContent = '⏸';
  gifPlayBtn.classList.add('active');
  frozenDataUrl = null;

  const s = SAMPLES[idx];
  sampleLabel.textContent  = s.label;
  positionText.textContent = (idx+1) + ' / ' + SAMPLES.length;
  setDisplay.textContent   = repCount + '回 × ' + setCount + 'セット';

  gifImage = new Image();
  gifImage.onload = () => { startGifLoop(); };
  // キャッシュバスター付きで必ずリロード
  gifImage.src = s.file + '?t=' + Date.now();
}

// 一時停止：canvas静止画にする
gifPlayBtn.onclick = () => {
  if (!gifPaused) {
    // 一時停止：現在のcanvasをそのままキープ、ループ停止
    gifPaused = true;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    gifPlayBtn.textContent = '▶';
    gifPlayBtn.classList.remove('active');
  } else {
    // 再生再開：gifImageのsrcを付け直してアニメ再起動
    gifPaused = false;
    gifPlayBtn.textContent = '⏸';
    gifPlayBtn.classList.add('active');
    const src = SAMPLES[sampleIndex].file + '?t=' + Date.now();
    gifImage = new Image();
    gifImage.onload = () => { startGifLoop(); };
    gifImage.src = src;
  }
};

// 速度変更：GIFアニメの速度をブラウザAPIで制御できないため、
// canvas描画周期で間引く（遅く見せる）/ GIF自体を高速再ロード（速く）
// 実用的な方法：遅い→canvasをたまにしか更新しない、速い→通常
let slowInterval = null;

function applySpeed() {
  speedLabel.textContent = SPEEDS[speedIdx].label;
  const m = SPEEDS[speedIdx].m;

  if (slowInterval) { clearInterval(slowInterval); slowInterval = null; }
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (gifPaused) return;

  if (m <= 1) {
    // 標準以上（速い）：rAFで毎フレーム描画
    startGifLoop();
  } else {
    // 遅い：一定間隔でcanvasに描画（間引き）
    const ms = 80 * m; // m=1.5→120ms, m=2→160ms間隔
    slowInterval = setInterval(() => {
      if (!gifPaused) drawFrame();
    }, ms);
  }
}

gifSlowBtn.onclick = () => { if(speedIdx>0)              { speedIdx--; applySpeed(); } };
gifFastBtn.onclick = () => { if(speedIdx<SPEEDS.length-1){ speedIdx++; applySpeed(); } };

// ===== サンプルナビ =====
let sampleIndex = 0;
document.getElementById('prevBtn').onclick = () => {
  sampleIndex = (sampleIndex - 1 + SAMPLES.length) % SAMPLES.length;
  loadSample(sampleIndex);
};
document.getElementById('nextBtn').onclick = () => {
  sampleIndex = (sampleIndex + 1) % SAMPLES.length;
  loadSample(sampleIndex);
};

// ===== 境界スライダー =====
let splitRatio  = 0.42; // samplePaneの割合（縦方向）
let isDragging  = false;
let isLandscape = false;

function updateDivider() {
  isLandscape = window.innerWidth > window.innerHeight;
  const stageRect = stage.getBoundingClientRect();

  if (!isLandscape) {
    // 縦並び：dividerは横線
    const y = stageRect.height * splitRatio;
    divider.style.cssText = `left:0;right:0;top:${y-3}px;height:6px;width:auto;bottom:auto;`;
    samplePane.style.cssText = `height:${splitRatio*100}%;width:100%;`;
    cameraPane.style.cssText = `height:${(1-splitRatio)*100}%;width:100%;flex:none;`;
  } else {
    // 横並び：dividerは縦線
    const x = stageRect.width * splitRatio;
    divider.style.cssText = `top:0;bottom:0;left:${x-3}px;width:6px;height:auto;right:auto;`;
    samplePane.style.cssText = `width:${splitRatio*100}%;height:100%;`;
    cameraPane.style.cssText = `width:${(1-splitRatio)*100}%;height:100%;flex:none;`;
  }
  // canvas再描画
  drawFrame();
}

divider.addEventListener('pointerdown', e => {
  isDragging = true;
  divider.setPointerCapture(e.pointerId);
  e.preventDefault();
});

divider.addEventListener('pointermove', e => {
  if (!isDragging) return;
  const rect = stage.getBoundingClientRect();
  if (!isLandscape) {
    splitRatio = Math.min(0.85, Math.max(0.15, (e.clientY - rect.top) / rect.height));
  } else {
    splitRatio = Math.min(0.85, Math.max(0.15, (e.clientX - rect.left) / rect.width));
  }
  updateDivider();
});

divider.addEventListener('pointerup',    () => { isDragging = false; });
divider.addEventListener('pointercancel',() => { isDragging = false; });

window.addEventListener('resize', updateDivider);

// ===== カメラ =====
let currentStream = null;
let guideVisible  = false;

function showScreen(name) {
  startScreen.hidden  = name !== 'start';
  cameraScreen.hidden = name !== 'camera';
  errorScreen.hidden  = name !== 'error';
}

async function startCamera() {
  stopCamera();
  sampleIndex = 0;
  speedIdx    = 2;
  loadSample(0);
  showScreen('camera');
  // divider初期化（DOMが表示されてから）
  requestAnimationFrame(() => { updateDivider(); });
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user' }, audio:false });
    currentStream   = stream;
    video.srcObject = stream;
    video.classList.add('mirrored');
  } catch(err) { showError(err); }
}

function stopCamera() {
  if (currentStream) { currentStream.getTracks().forEach(t=>t.stop()); currentStream=null; }
  if (rafId)         { cancelAnimationFrame(rafId); rafId=null; }
  if (slowInterval)  { clearInterval(slowInterval); slowInterval=null; }
}

function showError(err) {
  let msg = 'カメラを起動できませんでした。';
  if (err?.name==='NotAllowedError')  msg='カメラへのアクセスが許可されていません。「設定」→「Safari」→「カメラ」で許可してください。';
  if (err?.name==='NotFoundError')    msg='カメラが見つかりませんでした。';
  if (err?.name==='NotReadableError') msg='他のアプリがカメラを使用している可能性があります。';
  document.getElementById('errorMessage').textContent = msg;
  showScreen('error');
}

document.getElementById('startBtn').onclick   = () => startCamera();
document.getElementById('retryBtn').onclick   = () => startCamera();
document.getElementById('stopBtn').onclick    = () => { stopCamera(); showScreen('start'); };
document.getElementById('settingBtn').onclick = () => { stopCamera(); showScreen('start'); };

document.getElementById('guideToggleBtn').onclick = () => {
  guideVisible = !guideVisible;
  guideOverlay.hidden = !guideVisible;
  const btn = document.getElementById('guideToggleBtn');
  btn.classList.toggle('active', guideVisible);
  btn.textContent = guideVisible ? 'ガイド非表示' : 'ガイド表示';
};

document.addEventListener('visibilitychange', () => {
  if (document.hidden) stopCamera();
  else if (!cameraScreen.hidden && !currentStream) startCamera();
});
window.addEventListener('pagehide', stopCamera);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
</body>
</html>
