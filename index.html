<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<!-- viewport-fit=cover : iPadのノッチ/safe areaまで画面を使うための指定 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<!-- ホーム画面に追加した時、Safariのアドレスバーなしでアプリのように開けるようにする指定 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<!-- ブラウザのアドレスバー等の色をアプリのダーク背景に合わせる -->
<meta name="theme-color" content="#0b0e10">
<!-- PWAの設定ファイル(アプリ名・アイコン等を定義) -->
<link rel="manifest" href="manifest.json">
<!-- iPadのホーム画面アイコン -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<!-- ブラウザのタブに表示される小さいアイコン -->
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<title>表情ミラー</title>
<style>
  /* ===== 基本リセット ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: #0b0e10;
    color: #F5F5F0;
    /* iPad(Safari)で読みやすい標準フォント。日本語はHiragino Sansが自動で使われる */
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  #app {
    position: relative;
    width: 100%;
    height: 100vh;
    height: 100dvh; /* iOS Safariのアドレスバー分を正しく考慮した高さ */
    overflow: hidden;
  }

  [hidden] { display: none !important; }

  /* ===== スタート画面 ===== */
  #start-screen, #error-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 32px;
    text-align: center;
    background: radial-gradient(circle at 50% 30%, #161b1e, #0b0e10);
  }

  .app-title {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .app-desc {
    font-size: 15px;
    line-height: 1.7;
    color: rgba(245, 245, 240, 0.65);
    max-width: 320px;
  }

  .privacy-note {
    font-size: 12px;
    color: rgba(245, 245, 240, 0.4);
    max-width: 280px;
    line-height: 1.6;
  }

  .btn-primary {
    background: linear-gradient(135deg, #6EE7DE, #4FC3BD);
    color: #06201D;
    font-weight: 600;
    font-size: 17px;
    border: none;
    border-radius: 999px;
    padding: 16px 44px;
    min-height: 52px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(110, 231, 222, 0.25);
    transition: transform 0.15s ease;
  }
  .btn-primary:active { transform: scale(0.96); }

  /* ===== カメラ画面 ===== */
  /* 全体を縦に並べ、上(stage)が映像エリア、下(controls)が操作バー */
  #camera-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
  }

  /* 見本エリアとカメラエリアを並べる領域。
     縦長(portrait)の時は上下、横長(landscape)の時は左右に自動で切り替わる */
  #stage {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    background: #000; /* この黒い隙間が2つのエリアの境界線として見える */
    overflow: hidden;
  }
  @media (orientation: landscape) {
    #stage { flex-direction: row; }
  }

  .pane {
    position: relative;
    flex: 1;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
    background: #0b0e10;
  }

  video#video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #000;
  }
  /* 前面カメラの時だけ左右反転して「鏡」にする */
  video#video.mirrored { transform: scaleX(-1); }

  /* 顔の位置を合わせるための目安の楕円ガイド */
  #guide-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  #guide-overlay .oval {
    width: 56%;
    max-width: 340px;
    aspect-ratio: 3 / 4;
    border: 2px dashed rgba(255, 255, 255, 0.55);
    border-radius: 50%;
  }

  /* ===== 見本画像エリア ===== */
  .sample-pane img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain; /* 見本画像は全体が見えるよう、切れずに収める */
    background: #05070a;
  }

  .sample-label {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.4);
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 12px;
    color: rgba(245, 245, 240, 0.85);
  }

  /* 回数×セット数の設定UI(数字を大きく目立たせ、+/-は控えめに) */
  .target-box {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(110, 231, 222, 0.4);
    border-radius: 20px;
    padding: 8px 18px;
  }
  .stepper { display: flex; align-items: center; gap: 8px; }
  .step-btn {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.18);
    color: rgba(245, 245, 240, 0.7);
    font-size: 14px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .step-value {
    min-width: 38px;
    text-align: center;
    font-size: 32px;
    font-weight: 800;
    color: #6EE7DE;
    line-height: 1;
  }
  .step-unit { font-size: 15px; font-weight: 500; color: rgba(245, 245, 240, 0.8); }

  /* 見本の「前へ/次へ」ナビゲーション */
  .sample-nav {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 10px 12px;
    background: linear-gradient(to top, rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0));
  }
  .position-text {
    font-size: 13px;
    color: rgba(245, 245, 240, 0.75);
    min-width: 46px;
    text-align: center;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 14px;
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    background: #0b0e10;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
  }

  .btn-control {
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(8px);
    color: #F5F5F0;
    font-size: 14px;
    font-weight: 500;
    border-radius: 14px;
    padding: 12px 18px;
    min-height: 48px;
    min-width: 92px;
    cursor: pointer;
  }
  .btn-control.small {
    padding: 8px 14px;
    min-height: 40px;
    min-width: auto;
    font-size: 13px;
  }
  .btn-control.active {
    background: rgba(110, 231, 222, 0.22);
    border-color: #6EE7DE;
    color: #6EE7DE;
  }
  .btn-control.danger {
    background: rgba(255, 138, 101, 0.16);
    border-color: rgba(255, 138, 101, 0.4);
    color: #FF8A65;
  }

  #error-screen .app-desc { color: rgba(255, 200, 190, 0.85); }
</style>
</head>
<body>
<div id="app">

  <!-- ① 最初に表示される画面 -->
  <div id="start-screen">
    <div class="app-title">表情ミラー</div>
    <div class="app-desc">カメラに自分の顔を映して、鏡のように使えます。表情の練習にお使いください。</div>
    <button id="startBtn" class="btn-primary">カメラを起動</button>
    <div class="privacy-note">映像は録画・保存されず、外部にも送信されません。すべてこの画面上だけで表示されます。</div>
  </div>

  <!-- ② カメラ起動後の画面 -->
  <div id="camera-screen" hidden>

    <div id="stage">
      <!-- 見本画像エリア -->
      <div class="pane sample-pane">
        <img id="sampleImg" src="" alt="見本画像">
        <div class="sample-label" id="sampleLabel">見本 1</div>

        <div class="target-box">
          <div class="stepper">
            <button id="repsMinus" class="step-btn" aria-label="回数を減らす">−</button>
            <span id="repsValue" class="step-value">5</span>
            <button id="repsPlus" class="step-btn" aria-label="回数を増やす">＋</button>
          </div>
          <span class="step-unit">回 ×</span>
          <div class="stepper">
            <button id="setsMinus" class="step-btn" aria-label="セット数を減らす">−</button>
            <span id="setsValue" class="step-value">2</span>
            <button id="setsPlus" class="step-btn" aria-label="セット数を増やす">＋</button>
          </div>
          <span class="step-unit">セット</span>
        </div>

        <div class="sample-nav">
          <button id="prevSampleBtn" class="btn-control small">前へ</button>
          <span id="positionText" class="position-text">1 / 1</span>
          <button id="nextSampleBtn" class="btn-control small">次へ</button>
        </div>
      </div>

      <!-- カメラ(鏡)エリア -->
      <div class="pane camera-pane">
        <video id="video" autoplay playsinline muted></video>
        <div id="guide-overlay" hidden>
          <div class="oval"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="guideToggleBtn" class="btn-control">ガイド表示</button>
      <button id="stopBtn" class="btn-control danger">終了</button>
    </div>
  </div>

  <!-- ③ エラー時の画面 -->
  <div id="error-screen" hidden>
    <div class="app-title">カメラを起動できません</div>
    <div id="errorMessage" class="app-desc"></div>
    <button id="retryBtn" class="btn-primary">もう一度試す</button>
  </div>

</div>

<script>
  // ===== 画面上の要素を取得 =====
  const startScreen   = document.getElementById('start-screen');
  const cameraScreen  = document.getElementById('camera-screen');
  const errorScreen   = document.getElementById('error-screen');
  const video          = document.getElementById('video');
  const guideOverlay   = document.getElementById('guide-overlay');

  const startBtn        = document.getElementById('startBtn');
  const retryBtn         = document.getElementById('retryBtn');
  const guideToggleBtn   = document.getElementById('guideToggleBtn');
  const stopBtn          = document.getElementById('stopBtn');
  const errorMessage     = document.getElementById('errorMessage');

  // ===== 見本画像の設定 =====
  // ファイル名・表示ラベル・初期の回数(reps)とセット数(sets)をここで管理しています。
  // 画像を入れ替える場合は samples フォルダにファイルを置き、この配列も書き換えてください。
  // 拡張子は .jpg / .png / .gif が使えます（.gif はアニメーションもそのまま再生されます）。
  const SAMPLES = [
   //  { file: 'samples/04.gif', label: '口唇の運動（あ・お・う）', reps: 5, sets: 2 },
    { file: 'samples/05.gif', label: '口唇の突出－引き', reps: 5, sets: 2 },
    { file: 'samples/06.gif', label: '舌の突出－引き', reps: 5, sets: 2 },
    { file: 'samples/07.gif', label: '舌の左右', reps: 5, sets: 2 },
    { file: 'samples/08.gif', label: '舌の上下', reps: 5, sets: 2 },
   //  { file: 'samples/09.gif', label: '頬の膨らませ－凹ませ', reps: 5, sets: 2 },
    { file: 'samples/03.gif', label: '頬の膨らませ（左右）', reps: 5, sets: 2 },
    { file: 'samples/10.gif', label: '舌の運動（口唇に沿って一周）', reps: 5, sets: 2 }
    // 開口ー閉口 は見本画像がまだのため、いただいたら追加します
  ];

  let sampleIndex = 0; // 今表示している見本の番号
  // 見本ごとの回数・セット数(画面上の+/-ボタンでその場で調整できる)
  let repsTargets = SAMPLES.map(s => s.reps);
  let setsTargets = SAMPLES.map(s => s.sets);

  const sampleImg      = document.getElementById('sampleImg');
  const sampleLabel    = document.getElementById('sampleLabel');
  const positionText   = document.getElementById('positionText');
  const repsValue      = document.getElementById('repsValue');
  const setsValue      = document.getElementById('setsValue');
  const repsMinus      = document.getElementById('repsMinus');
  const repsPlus       = document.getElementById('repsPlus');
  const setsMinus      = document.getElementById('setsMinus');
  const setsPlus       = document.getElementById('setsPlus');
  const prevSampleBtn  = document.getElementById('prevSampleBtn');
  const nextSampleBtn  = document.getElementById('nextSampleBtn');

  // 見本画像エリアの表示内容を、現在の状態に合わせて描き直す関数
  function renderSample() {
    const current = SAMPLES[sampleIndex];
    sampleImg.src = current.file;
    sampleImg.alt = current.label;
    sampleLabel.textContent = current.label;
    positionText.textContent = (sampleIndex + 1) + ' / ' + SAMPLES.length;
    repsValue.textContent = repsTargets[sampleIndex];
    setsValue.textContent = setsTargets[sampleIndex];
  }

  // ===== 状態を保持する変数 =====
  let currentStream = null;   // 今使っているカメラ映像（ストリーム）
  let guideVisible = false;   // ガイド楕円を表示中かどうか

  // 画面（start / camera / error）の切り替えをまとめる関数
  function showScreen(name) {
    startScreen.hidden  = name !== 'start';
    cameraScreen.hidden = name !== 'camera';
    errorScreen.hidden  = name !== 'error';
  }

  // カメラを起動する関数(常に前面カメラを使用)
  async function startCamera() {
    stopCamera(); // 前のカメラが動いていたら先に止める
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user' },
        audio: false
      });
      currentStream = stream;
      video.srcObject = stream;
      video.classList.add('mirrored'); // 常に左右反転して「鏡」にする
      showScreen('camera');
    } catch (err) {
      showError(err);
    }
  }

  // カメラを止める関数（バッテリー節約・プライバシーのため）
  function stopCamera() {
    if (currentStream) {
      currentStream.getTracks().forEach(track => track.stop());
      currentStream = null;
    }
  }

  // エラー内容に応じてメッセージを表示する関数
  function showError(err) {
    let msg = 'カメラを起動できませんでした。';
    if (err && err.name === 'NotAllowedError') {
      msg = 'カメラへのアクセスが許可されていません。「設定」→「Safari」→「カメラ」で許可してください。';
    } else if (err && err.name === 'NotFoundError') {
      msg = 'カメラが見つかりませんでした。';
    } else if (err && err.name === 'NotReadableError') {
      msg = '他のアプリがカメラを使用している可能性があります。';
    }
    errorMessage.textContent = msg;
    showScreen('error');
  }

  // ===== ボタンの動作を設定 =====
  startBtn.addEventListener('click', () => startCamera());
  retryBtn.addEventListener('click', () => startCamera());

  guideToggleBtn.addEventListener('click', () => {
    guideVisible = !guideVisible;
    guideOverlay.hidden = !guideVisible;
    guideToggleBtn.classList.toggle('active', guideVisible);
    guideToggleBtn.textContent = guideVisible ? 'ガイド非表示' : 'ガイド表示';
  });

  stopBtn.addEventListener('click', () => {
    stopCamera();
    showScreen('start');
  });

  // 見本を1つ前に戻す(最初の見本の時は最後の見本に循環する)
  prevSampleBtn.addEventListener('click', () => {
    sampleIndex = (sampleIndex - 1 + SAMPLES.length) % SAMPLES.length;
    renderSample();
  });

  // 見本を1つ次に進める(最後の見本の時は最初の見本に循環する)
  nextSampleBtn.addEventListener('click', () => {
    sampleIndex = (sampleIndex + 1) % SAMPLES.length;
    renderSample();
  });

  // 今表示中の見本の「回数」を1減らす(1回未満にはしない)
  repsMinus.addEventListener('click', () => {
    repsTargets[sampleIndex] = Math.max(1, repsTargets[sampleIndex] - 1);
    renderSample();
  });

  // 今表示中の見本の「回数」を1増やす
  repsPlus.addEventListener('click', () => {
    repsTargets[sampleIndex] += 1;
    renderSample();
  });

  // 今表示中の見本の「セット数」を1減らす(1セット未満にはしない)
  setsMinus.addEventListener('click', () => {
    setsTargets[sampleIndex] = Math.max(1, setsTargets[sampleIndex] - 1);
    renderSample();
  });

  // 今表示中の見本の「セット数」を1増やす
  setsPlus.addEventListener('click', () => {
    setsTargets[sampleIndex] += 1;
    renderSample();
  });

  renderSample(); // 起動直後から見本エリアの表示を整えておく

  // アプリをバックグラウンドに回した時はカメラを止め、戻ってきたら再開する
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      stopCamera();
    } else if (!cameraScreen.hidden && !currentStream) {
      startCamera();
    }
  });

  window.addEventListener('pagehide', stopCamera);

  // ===== PWA: Service Workerの登録 =====
  // ファイルをキャッシュ(端末内保存)させ、再訪問時の起動を速くする
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {
        // 登録に失敗してもアプリ自体は通常通り動作する
      });
    });
  }
</script>
</body>
</html>
