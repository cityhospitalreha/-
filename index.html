<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0e10">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<title>表情ミラー</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: #0b0e10;
    color: #F5F5F0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  #app {
    position: relative;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }

  [hidden] { display: none !important; }

  #start-screen, #error-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 32px;
    text-align: center;
    background: radial-gradient(circle at 50% 30%, #161b1e, #0b0e10);
  }

  .app-title {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .app-desc {
    font-size: 15px;
    line-height: 1.7;
    color: rgba(245, 245, 240, 0.65);
    max-width: 320px;
  }

  .privacy-note {
    font-size: 12px;
    color: rgba(245, 245, 240, 0.4);
    max-width: 280px;
    line-height: 1.6;
  }

  .btn-primary {
    background: linear-gradient(135deg, #6EE7DE, #4FC3BD);
    color: #06201D;
    font-weight: 600;
    font-size: 17px;
    border: none;
    border-radius: 999px;
    padding: 16px 44px;
    min-height: 52px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(110, 231, 222, 0.25);
    transition: transform 0.15s ease;
  }
  .btn-primary:active { transform: scale(0.96); }

  #camera-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
  }

  #stage {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    background: #000;
    overflow: hidden;
  }
  @media (orientation: landscape) {
    #stage { flex-direction: row; }
  }

  .pane {
    position: relative;
    flex: 1;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
    background: #0b0e10;
  }

  .sample-pane { flex: 0.65; }
  .camera-pane { flex: 1.35; }

  video#video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #000;
  }
  video#video.mirrored { transform: scaleX(-1); }

  #guide-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  #guide-overlay .oval {
    width: 56%;
    max-width: 340px;
    aspect-ratio: 3 / 4;
    border: 2px dashed rgba(255, 255, 255, 0.55);
    border-radius: 50%;
  }

  /* ===== 見本画像 =====
     object-fit: cover で画像を枠いっぱいに拡大し、
     すべての見本が同じ大きさに見えるようにする。
     顔イラストはどの画像も中央に描かれているので切れにくい。 */
  .sample-pane img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center center;
    background: #05070a;
  }

  .sample-label {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.4);
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 12px;
    color: rgba(245, 245, 240, 0.85);
  }

  .counter-box {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(8px);
    border-radius: 16px;
    padding: 8px 10px;
  }
  .count-display { text-align: center; min-width: 46px; }
  .count-number { font-size: 20px; font-weight: 700; color: #6EE7DE; line-height: 1; }
  .count-total { font-size: 10px; color: rgba(245, 245, 240, 0.5); margin-top: 2px; }

  .sample-nav {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 10px 12px;
    background: linear-gradient(to top, rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0));
  }
  .position-text {
    font-size: 13px;
    color: rgba(245, 245, 240, 0.75);
    min-width: 46px;
    text-align: center;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 14px;
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    background: #0b0e10;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
  }

  .btn-control {
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(8px);
    color: #F5F5F0;
    font-size: 14px;
    font-weight: 500;
    border-radius: 14px;
    padding: 12px 18px;
    min-height: 48px;
    min-width: 92px;
    cursor: pointer;
  }
  .btn-control.small {
    padding: 8px 14px;
    min-height: 40px;
    min-width: auto;
    font-size: 13px;
  }
  .btn-control.active {
    background: rgba(110, 231, 222, 0.22);
    border-color: #6EE7DE;
    color: #6EE7DE;
  }
  .btn-control.danger {
    background: rgba(255, 138, 101, 0.16);
    border-color: rgba(255, 138, 101, 0.4);
    color: #FF8A65;
  }

  #error-screen .app-desc { color: rgba(255, 200, 190, 0.85); }
</style>
</head>
<body>
<div id="app">

  <div id="start-screen">
    <div class="app-title">表情ミラー</div>
    <div class="app-desc">カメラに自分の顔を映して、鏡のように使えます。表情の練習にお使いください。</div>
    <button id="startBtn" class="btn-primary">カメラを起動</button>
    <div class="privacy-note">映像は録画・保存されず、外部にも送信されません。すべてこの画面上だけで表示されます。</div>
  </div>

  <div id="camera-screen" hidden>
    <div id="stage">
      <div class="pane sample-pane">
        <img id="sampleImg" src="" alt="見本画像">
        <div class="sample-label" id="sampleLabel"></div>

        <div class="counter-box">
          <button id="resetBtn" class="btn-control small">リセット</button>
          <div class="count-display">
            <div class="count-number" id="countNumber">0</div>
            <div class="count-total">合計 <span id="totalNumber">0</span></div>
          </div>
          <button id="plusBtn" class="btn-control small active">+1</button>
        </div>

        <div class="sample-nav">
          <button id="prevSampleBtn" class="btn-control small">前へ</button>
          <span id="positionText" class="position-text">1 / 1</span>
          <button id="nextSampleBtn" class="btn-control small">次へ</button>
        </div>
      </div>

      <div class="pane camera-pane">
        <video id="video" autoplay playsinline muted></video>
        <div id="guide-overlay" hidden>
          <div class="oval"></div>
        </div>
      </div>
    </div>

    <!-- カメラ切替ボタンを削除。ガイド表示と終了の2つのみ -->
    <div class="controls">
      <button id="guideToggleBtn" class="btn-control">ガイド表示</button>
      <button id="stopBtn" class="btn-control danger">終了</button>
    </div>
  </div>

  <div id="error-screen" hidden>
    <div class="app-title">カメラを起動できません</div>
    <div id="errorMessage" class="app-desc"></div>
    <button id="retryBtn" class="btn-primary">もう一度試す</button>
  </div>

</div>

<script>
  const startScreen   = document.getElementById('start-screen');
  const cameraScreen  = document.getElementById('camera-screen');
  const errorScreen   = document.getElementById('error-screen');
  const video         = document.getElementById('video');
  const guideOverlay  = document.getElementById('guide-overlay');

  const startBtn       = document.getElementById('startBtn');
  const retryBtn       = document.getElementById('retryBtn');
  const guideToggleBtn = document.getElementById('guideToggleBtn');
  const stopBtn        = document.getElementById('stopBtn');
  const errorMessage   = document.getElementById('errorMessage');

  // ===== 見本画像の設定 =====
  // 画像を追加する時は samples フォルダにファイルを置き、この配列に行を足してください。
  const SAMPLES = [
    { file: 'samples/01.gif', label: '開口－閉口' },
    { file: 'samples/05.gif', label: '口唇の突出－引き（う・い）' },
    { file: 'samples/04.gif', label: '口唇の運動（あ・お・う）' },
    { file: 'samples/02.gif', label: '舌の突出－引き' },
    { file: 'samples/08.gif', label: '舌の左右' },
    { file: 'samples/06.gif', label: '舌の上下' },
    { file: 'samples/10.gif', label: '舌の運動（一周・時計回り）' },
    { file: 'samples/11.gif', label: '舌の運動（一周・反時計回り）' }
  ];

  let sampleIndex  = 0;
  let sampleCounts = new Array(SAMPLES.length).fill(0);

  const sampleImg     = document.getElementById('sampleImg');
  const sampleLabel   = document.getElementById('sampleLabel');
  const positionText  = document.getElementById('positionText');
  const countNumber   = document.getElementById('countNumber');
  const totalNumber   = document.getElementById('totalNumber');
  const prevSampleBtn = document.getElementById('prevSampleBtn');
  const nextSampleBtn = document.getElementById('nextSampleBtn');
  const plusBtn       = document.getElementById('plusBtn');
  const resetBtn      = document.getElementById('resetBtn');

  function renderSample() {
    const current = SAMPLES[sampleIndex];
    sampleImg.src        = current.file;
    sampleImg.alt        = current.label;
    sampleLabel.textContent  = current.label;
    positionText.textContent = (sampleIndex + 1) + ' / ' + SAMPLES.length;
    countNumber.textContent  = sampleCounts[sampleIndex];
    const total = sampleCounts.reduce((sum, n) => sum + n, 0);
    totalNumber.textContent  = total;
  }

  let currentStream = null;
  // 前面カメラ固定（切替ボタンを削除したため）
  const facingMode  = 'user';
  let guideVisible  = false;

  function showScreen(name) {
    startScreen.hidden  = name !== 'start';
    cameraScreen.hidden = name !== 'camera';
    errorScreen.hidden  = name !== 'error';
  }

  async function startCamera() {
    stopCamera();
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: facingMode },
        audio: false
      });
      currentStream  = stream;
      video.srcObject = stream;
      video.classList.add('mirrored'); // 前面カメラ固定なので常に鏡表示
      showScreen('camera');
    } catch (err) {
      showError(err);
    }
  }

  function stopCamera() {
    if (currentStream) {
      currentStream.getTracks().forEach(track => track.stop());
      currentStream = null;
    }
  }

  function showError(err) {
    let msg = 'カメラを起動できませんでした。';
    if (err && err.name === 'NotAllowedError') {
      msg = 'カメラへのアクセスが許可されていません。「設定」→「Safari」→「カメラ」で許可してください。';
    } else if (err && err.name === 'NotFoundError') {
      msg = 'カメラが見つかりませんでした。';
    } else if (err && err.name === 'NotReadableError') {
      msg = '他のアプリがカメラを使用している可能性があります。';
    }
    errorMessage.textContent = msg;
    showScreen('error');
  }

  startBtn.addEventListener('click', () => startCamera());
  retryBtn.addEventListener('click', () => startCamera());

  guideToggleBtn.addEventListener('click', () => {
    guideVisible = !guideVisible;
    guideOverlay.hidden = !guideVisible;
    guideToggleBtn.classList.toggle('active', guideVisible);
    guideToggleBtn.textContent = guideVisible ? 'ガイド非表示' : 'ガイド表示';
  });

  stopBtn.addEventListener('click', () => {
    stopCamera();
    showScreen('start');
  });

  prevSampleBtn.addEventListener('click', () => {
    sampleIndex = (sampleIndex - 1 + SAMPLES.length) % SAMPLES.length;
    renderSample();
  });

  nextSampleBtn.addEventListener('click', () => {
    sampleIndex = (sampleIndex + 1) % SAMPLES.length;
    renderSample();
  });

  plusBtn.addEventListener('click', () => {
    sampleCounts[sampleIndex] += 1;
    renderSample();
  });

  resetBtn.addEventListener('click', () => {
    sampleCounts[sampleIndex] = 0;
    renderSample();
  });

  renderSample();

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      stopCamera();
    } else if (!cameraScreen.hidden && !currentStream) {
      startCamera();
    }
  });

  window.addEventListener('pagehide', stopCamera);

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
